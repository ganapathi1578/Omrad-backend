# version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ai_app_db
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
      build: .
      # Tell Docker to run our new script
      command: sh entrypoint.sh
      volumes:
        - .:/app
      ports:
        - "8000:8000"
      env_file:           # <--- Make sure this is here!
      - .env
      environment:
        - POSTGRES_NAME=ai_app_db
        - POSTGRES_USER=myuser
        - POSTGRES_PASSWORD=mypassword
        - POSTGRES_HOST=db
        - POSTGRES_PORT=5432
        # Add your automatic superuser credentials here
        - SUPERUSER_EMAIL=admin@example.com
        - SUPERUSER_PASSWORD=admin123
      depends_on:
        - db
        - redis

volumes:
  postgres_data: